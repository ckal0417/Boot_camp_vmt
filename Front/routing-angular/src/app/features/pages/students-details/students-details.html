@if (student$ | async; as student) {

  <mat-card style="margin: 20px">

    <mat-card-header>
      <div mat-card-avatar>
        <img [src]="student.avatar" width="50" height="50" />
      </div>

      <mat-card-title>{{ student.name }}</mat-card-title>
      <mat-card-subtitle>{{ student.email }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      @for (item of student | keyvalue: originalOrder; track item.key) {
        <p>
          <strong>{{ item.key }}:</strong> {{ item.value }}
        </p>
      }
    </mat-card-content>

    <mat-card-actions>
      <button mat-button routerLink="/students">
        Volver
      </button>
    </mat-card-actions>

  </mat-card>

} @else {
  <p>Cargando detalle...</p>
}
