<form [formGroup]="studentForm">

  <mat-form-field appearance="outline">
    <mat-label>Name</mat-label>

    <input
      matInput
      formControlName="name"
    />
  </mat-form-field>

  <br>

  <mat-form-field appearance="outline">
    <mat-label>Email</mat-label>

    <input
      matInput
      formControlName="email"
    />
  </mat-form-field>

  <br>

  <mat-form-field appearance="outline">
    <mat-label>Avatar</mat-label>

    <input
      matInput
      formControlName="avatar"
    />
  </mat-form-field>

  <br>

  <button
    mat-raised-button
    color="primary"
    (click)="save()"
  >
    Guardar
  </button>

  <button
  mat-button
  color="warn"
  (click)="cancel()"
>
  Cancel
</button>

</form>
