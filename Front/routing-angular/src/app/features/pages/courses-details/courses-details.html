@if (course$ | async; as course) {

  <mat-card style="margin: 20px">

    <mat-card-header>
      <mat-card-title>{{ course.name }}</mat-card-title>
      <mat-card-subtitle>{{ course.description }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
        <p></p>

      @if (course.level) {
        <mat-chip>
          {{ course.level }}
        </mat-chip>
      }

      @for (item of course | keyvalue: originalOrder; track item.key) {
        <p>
          <strong>{{ item.key }}:</strong> {{ item.value }}
        </p>
      }

    </mat-card-content>

    <mat-card-actions>
      <button mat-button routerLink="/courses">
        Volver
      </button>
    </mat-card-actions>

  </mat-card>

} @else {
  <mat-spinner></mat-spinner>
}
