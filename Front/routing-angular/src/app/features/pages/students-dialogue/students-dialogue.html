<h2 mat-dialog-title>
  Delete Student
</h2>

<mat-dialog-content>
  <p>
    ¿Estás seguro de eliminar este estudiante?
  </p>
</mat-dialog-content>

<mat-dialog-actions align="center">

  <button
    mat-button
    (click)="cancel()"
  >
    Cancel
  </button>

  <button
    mat-raised-button
    color="warn"
    (click)="confirm()"
  >
    Delete
  </button>

</mat-dialog-actions>
