@if (courses$ | async; as courses) {

  @for (course of courses; track course.id) {
    <mat-card style="margin: 10px">

      <mat-card-header>
        <mat-card-title>{{ course.name }}</mat-card-title>
        <mat-card-subtitle>{{ course.email || course.description || course.level }}</mat-card-subtitle>
      </mat-card-header>

      <mat-card-actions>
        <button mat-button [routerLink]="['/courses', course.id]">
          Ver detalle
        </button>
      </mat-card-actions>

    </mat-card>
  }

} @else {
  <mat-spinner></mat-spinner>
}
